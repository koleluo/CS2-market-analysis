<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="coin" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="45%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#8B6200"/>
    </radialGradient>
    <radialGradient id="inner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </radialGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="url(#coin)" stroke="#7A5200" stroke-width="1.5"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="21" fill="url(#inner)" stroke="#8B6200" stroke-width="1"/>
  <!-- Left laurel -->
  <g fill="#7A5200" opacity="0.85">
    <ellipse cx="9" cy="28" rx="4" ry="2.5" transform="rotate(-30 9 28)"/>
    <ellipse cx="7" cy="33" rx="4" ry="2.5" transform="rotate(-15 7 33)"/>
    <ellipse cx="8" cy="38" rx="4" ry="2.5" transform="rotate(5 8 38)"/>
    <ellipse cx="11" cy="43" rx="3.5" ry="2" transform="rotate(20 11 43)"/>
  </g>
  <!-- Right laurel -->
  <g fill="#7A5200" opacity="0.85">
    <ellipse cx="55" cy="28" rx="4" ry="2.5" transform="rotate(30 55 28)"/>
    <ellipse cx="57" cy="33" rx="4" ry="2.5" transform="rotate(15 57 33)"/>
    <ellipse cx="56" cy="38" rx="4" ry="2.5" transform="rotate(-5 56 38)"/>
    <ellipse cx="53" cy="43" rx="3.5" ry="2" transform="rotate(-20 53 43)"/>
  </g>
  <!-- ? symbol -->
  <text x="32" y="40" text-anchor="middle" font-size="22" font-weight="900"
        font-family="Georgia, serif" fill="#5C3D00" letter-spacing="-1">?</text>
</svg>
